<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PullFusion 控制台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--card-bg:#161b22;--border:#30363d;
  --text:#c9d1d9;--text2:#8b949e;--accent:#58a6ff;
  --green:#3fb950;--red:#f85149;--orange:#d29922;--purple:#a371f7;--yellow:#e3b341;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,0.3);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.header{background:var(--card-bg);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;color:var(--accent)}.header h1 span{color:var(--text2);font-size:13px;font-weight:400;margin-left:4px}
.header-right{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.dot.err{background:var(--red)}
.container{max-width:1700px;margin:0 auto;padding:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.stat-card .lbl{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-card .val{font-size:26px;font-weight:700;color:var(--text)}
.stat-card .sub{font-size:12px;color:var(--text2);margin-top:2px}
.stat-card.g .val{color:var(--green)}.stat-card.r .val{color:var(--red)}.stat-card.o .val{color:var(--orange)}.stat-card.b .val{color:var(--accent)}
.panel{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.panel-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600}
.panel-bd{padding:0;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:9px 14px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;vertical-align:middle}
th .arr{display:inline-block;width:10px;font-size:10px;opacity:.3;margin-left:3px}
th.sorted{color:var(--text)}
th.sorted .arr{opacity:1;color:var(--accent)}
th .lbl{display:inline-block;width:auto}
th.no-sort{cursor:default}
td{padding:9px 14px;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tr:hover{background:rgba(255,255,255,.02)}tr:last-child td{border-bottom:none}
.tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;margin:1px 2px;border:1px solid}
.hb{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500}
.click{cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px}
.click:hover{color:var(--accent)}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
footer{text-align:center;padding:16px;color:var(--text2);font-size:12px;border-top:1px solid var(--border)}
@media(max-width:768px){
  .container{padding:10px}
  .header{padding:10px 16px;flex-direction:column;gap:6px;text-align:center}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  table{font-size:12px}th,td{padding:7px 10px}
}
</style>
</head>
<body>

<div class="header">
  <h1>PullFusion <span>v1.0</span></h1>
  <div class="header-right">
    <span id="uptime">--</span>
    <div class="dot" id="dot"></div>
    <span id="lastRef">--</span>
    <button class="click" onclick="refreshAll(true)" style="border:1px solid var(--border);padding:4px 10px;border-radius:6px;background:var(--card-bg);color:var(--text);cursor:pointer">刷新全部</button>
  </div>
</div>

<div class="container">

  <div class="stats-grid">
    <div class="stat-card b"><div class="lbl">节点总数</div><div class="val" id="stTotal">-</div><div class="sub">启用 <span id="stEnabled">-</span></div></div>
    <div class="stat-card g"><div class="lbl">优秀 / 良好</div><div class="val" id="stGood">-</div><div class="sub">延迟 &lt;200 / &lt;500ms</div></div>
    <div class="stat-card o"><div class="lbl">一般 / 高延迟</div><div class="val" id="stWarn">-</div><div class="sub">延迟 &lt;1000 / &ge;1000ms</div></div>
    <div class="stat-card r"><div class="lbl">不可用</div><div class="val" id="stDown">-</div><div class="sub">未测试 / 测试失败</div></div>
  </div>

  <div class="panel">
    <div class="panel-hd"><span>节点列表</span><span style="font-size:12px;font-weight:400;color:var(--text2)">手动刷新 · 点击延迟/速度重新测试</span></div>
    <div class="panel-bd">
      <table><colgroup>
        <col style="width:14%"><col style="width:24%"><col style="width:14%"><col style="width:9%"><col style="width:9%"><col style="width:9%"><col style="width:9%"><col style="width:12%">
      </colgroup><thead>
        <tr>
          <th data-sort="display_name" class="sorted asc"><span class="lbl">名称</span><span class="arr">▲</span></th>
          <th data-sort="url"><span class="lbl">URL</span><span class="arr">▲</span></th>
          <th>标签</th>
          <th data-sort="latency_ms" class="no-sort"><span class="lbl">延迟</span><span class="arr"></span></th>
          <th data-sort="speed_kbps" class="no-sort"><span class="lbl">速度</span><span class="arr"></span></th>
          <th data-sort="score"><span class="lbl">评分</span><span class="arr">▲</span></th>
          <th data-sort="success_rate"><span class="lbl">成功率</span><span class="arr">▲</span></th>
          <th data-sort="health"><span class="lbl">健康</span><span class="arr">▲</span></th>
        </tr>
      </thead><tbody id="tb"></tbody></table>
      <div class="empty" id="emptyTb" style="display:none"><div style="font-size:28px;margin-bottom:6px">📡</div>暂无节点</div>
    </div>
  </div>

</div>

<footer>PullFusion &copy; 2026 — Docker 镜像加速代理 · 数据来源: status.anye.xyz</footer>

<script>
// State persisted to localStorage
var STORAGE_KEY = 'pullfusion_dashboard_v1';
var state = {
  sortK: 'display_name',
  sortD: 'asc',
};
try {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved) state = Object.assign(state, JSON.parse(saved));
} catch (e) {}

var nodes = [];
var errFlag = false;
var testBusy = {};

function $(id) { return document.getElementById(id); }
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function escA(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;') : ''; }

function fmtUptime(seconds) {
  if (!seconds || seconds < 0 || !isFinite(seconds) || seconds > 315360000) return '--';
  var d = Math.floor(seconds / 86400);
  var h = Math.floor((seconds % 86400) / 3600);
  var m = Math.floor((seconds % 3600) / 60);
  if (d > 0) return d + '天' + h + '时';
  if (h > 0) return h + '时' + m + '分';
  return m + '分';
}

function latencyHealth(ms) {
  if (!ms || ms <= 0) return { cls: 'down', txt: '未测试', color: '#8b949e' };
  if (ms < 200) return { cls: 'excellent', txt: '优秀', color: '#3fb950' };
  if (ms < 500) return { cls: 'good', txt: '良好', color: '#58a6ff' };
  if (ms < 1000) return { cls: 'normal', txt: '一般', color: '#d29922' };
  return { cls: 'slow', txt: '高延迟', color: '#e3b341' };
}

function renderRow(n) {
  var h = latencyHealth(n.latency_ms);
  var url = n.url || '--';
  var tags = (n.tags || []).map(function(tg) {
    return '<span class="tag" style="border-color:' + (tg.color || '#30363d') + ';color:' + (tg.color || '#c9d1d9') + '">' + esc(tg.name) + '</span>';
  }).join('');
  if (!tags) tags = '<span style="color:var(--text2)">--</span>';
  return '<tr data-url="' + escA(url) + '">' +
    '<td><strong>' + esc(n.display_name || '--') + '</strong></td>' +
    '<td title="' + escA(url) + '" style="font-family:monospace;font-size:12px">' + esc(url) + '</td>' +
    '<td>' + tags + '</td>' +
    '<td class="lat"><span class="click" data-test="lat" data-url="' + escA(url) + '">' + (n.latency_ms > 0 ? n.latency_ms.toFixed(0) + ' ms' : '<span style="color:var(--text2)">点击测试</span>') + '</span></td>' +
    '<td class="spd"><span class="click" data-test="spd" data-url="' + escA(url) + '">' + (n.speed_kbps > 0 ? (n.speed_kbps.toFixed(n.speed_kbps < 10 ? 1 : 0) + ' KB/s') : '<span style="color:var(--text2)">点击测试</span>') + '</span></td>' +
    '<td class="score">' + (n.score || 0) + '</td>' +
    '<td class="sr">' + ((n.success_rate || 0) * 100).toFixed(0) + '%</td>' +
    '<td class="hb"><span class="hb" style="background:' + h.color + '22;color:' + h.color + '">' + h.txt + '</span></td>' +
    '</tr>';
}

function render() {
  var t = $('tb'), e = $('emptyTb');
  if (!nodes.length) { t.innerHTML = ''; e.style.display = 'block'; return; }
  e.style.display = 'none';
  t.innerHTML = nodes.map(renderRow).join('');
}

function updateStats() {
  var total = nodes.length, ex = 0, gd = 0, nm = 0, sl = 0, dn = 0;
  nodes.forEach(function(n) {
    var h = latencyHealth(n.latency_ms);
    if (h.cls === 'excellent') ex++;
    else if (h.cls === 'good') gd++;
    else if (h.cls === 'normal') nm++;
    else if (h.cls === 'slow') sl++;
    else dn++;
  });
  $('stTotal').textContent = total; $('stEnabled').textContent = total;
  $('stGood').textContent = ex + gd; $('stWarn').textContent = nm + sl;
  $('stDown').textContent = dn;
}

function sortNodes(k, d) {
  return nodes.slice().sort(function(a, b) {
    var va = a[k], vb = b[k];
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return d === 'asc' ? -1 : 1;
    if (va > vb) return d === 'asc' ? 1 : -1;
    return 0;
  });
}

function refreshSortUI() {
  var ths = document.querySelectorAll('th[data-sort]');
  ths.forEach(function(th) {
    th.classList.remove('sorted', 'asc', 'desc');
    var arr = th.querySelector('.arr');
    if (th.dataset.sort === state.sortK) {
      th.classList.add('sorted');
      th.classList.add(state.sortD === 'asc' ? 'asc' : 'desc');
      arr.textContent = state.sortD === 'asc' ? '▲' : '▼';
    } else {
      arr.textContent = '▲';
    }
  });
}

function applySort() {
  nodes = sortNodes(state.sortK, state.sortD);
  render();
  refreshSortUI();
}

async function refreshAll(silent) {
  try {
    var r = await fetch('/admin/nodes');
    if (!r.ok) throw Error('' + r.status);
    var raw = await r.json();
    var sr = await fetch('/admin/stats'); var st = await sr.json();
    var secs = parseFloat(st.uptime_seconds);
    $('uptime').textContent = '运行 ' + fmtUptime(secs);
    nodes = raw;
    applySort();
    updateStats();
    errFlag = false; $('dot').classList.remove('err');
  } catch (e) {
    errFlag = true; $('dot').classList.add('err');
    if (!silent) console.error('refresh error', e);
  }
  $('lastRef').textContent = new Date().toLocaleTimeString('zh-CN');
}

// Update one row in place after a test completes
function updateRow(url, newData) {
  var tr = document.querySelector('tr[data-url="' + cssEscape(url) + '"]');
  if (!tr) return;
  var idx = nodes.findIndex(function(n) { return n.url === url; });
  if (idx >= 0) {
    nodes[idx] = Object.assign(nodes[idx], newData);
  }
  var h = latencyHealth(newData.latency_ms);
  tr.querySelector('.lat').innerHTML = '<span class="click" data-test="lat" data-url="' + escA(url) + '">' + (newData.latency_ms > 0 ? newData.latency_ms.toFixed(0) + ' ms' : '<span style="color:var(--text2)">未测</span>') + '</span>';
  tr.querySelector('.spd').innerHTML = '<span class="click" data-test="spd" data-url="' + escA(url) + '">' + (newData.speed_kbps > 0 ? (newData.speed_kbps.toFixed(newData.speed_kbps < 10 ? 1 : 0) + ' KB/s') : '<span style="color:var(--text2)">未测</span>') + '</span>';
  tr.querySelector('.score').textContent = newData.score || 0;
  tr.querySelector('.sr').textContent = ((newData.success_rate || 0) * 100).toFixed(0) + '%';
  tr.querySelector('.hb').innerHTML = '<span class="hb" style="background:' + h.color + '22;color:' + h.color + '">' + h.txt + '</span>';
  // Rebind click handlers
  tr.querySelectorAll('.click').forEach(function(el) { bindClick(el); });
  updateStats();
}

function cssEscape(s) {
  if (!s) return '';
  if (window.CSS && CSS.escape) return CSS.escape(s);
  return s.replace(/[^a-zA-Z0-9_-]/g, function(c) { return '\\' + c; });
}

function bindClick(el) {
  el.onclick = function(e) {
    e.stopPropagation();
    var url = el.getAttribute('data-url');
    var kind = el.getAttribute('data-test');
    if (testBusy[url]) return;
    testSingle(url, kind, el);
  };
}

async function testSingle(url, kind, el) {
  if (testBusy[url]) return;
  testBusy[url] = true;
  var origHtml = el.innerHTML;
  el.innerHTML = '<span style="color:var(--accent)">测试中...</span>';
  try {
    var r = await fetch('/admin/nodes/test-one', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: url, event_type: kind })
    });
    if (!r.ok) throw new Error('http ' + r.status);
    // Refetch only this node's data
    var rr = await fetch('/admin/nodes');
    if (rr.ok) {
      var arr = await rr.json();
      var fresh = arr.find(function(x) { return x.url === url; });
      if (fresh) {
        updateRow(url, fresh);
      }
    }
  } catch (e) {
    el.innerHTML = '<span style="color:var(--red)">失败</span>';
    setTimeout(function() { el.innerHTML = origHtml; bindClick(el); }, 2000);
  }
  testBusy[url] = false;
}

async function refreshAllNodes() {
  if (testBusy['__all__']) return;
  testBusy['__all__'] = true;
  try {
    await fetch('/admin/nodes/test-all', { method: 'POST' });
    // Wait then reload
    setTimeout(function() { refreshAll(true); testBusy['__all__'] = false; }, 8000);
  } catch (e) {
    testBusy['__all__'] = false;
  }
}

document.addEventListener('DOMContentLoaded', function() {
  // Sort handlers
  document.querySelectorAll('th[data-sort]').forEach(function(th) {
    th.addEventListener('click', function() {
      var k = th.dataset.sort;
      if (state.sortK === k) {
        state.sortD = state.sortD === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortK = k; state.sortD = 'asc';
      }
      saveState();
      applySort();
    });
  });

  // Initial load
  refreshAll(true);
  // Bind clickable cells in initial render
  setTimeout(function() {
    document.querySelectorAll('.click').forEach(bindClick);
  }, 100);
});
</script>

</body>
</html>
