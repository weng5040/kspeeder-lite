mirrors:
  dockerhub: []
  ghcr: []

proxies:
  enabled: false
  nodes: []

server:
  registry_port: 443
  proxy_port: 5003
  registry_domain: docker.inyo.cc
  tls:
    cert: data/docker.inyo.cc.crt
    key: data/docker.inyo.cc.key

downloader:
  max_concurrent_per_blob: 4
  max_concurrent_global: 64
  chunk_min_size: 262144
  chunk_max_size: 33554432
  node_fail_threshold: 3
  speed_test_interval: 300s
  speed_test_url: https://github.com/linkease/istore-packages/releases/download/prebuilt/quickstart-binary-0.11.9.tar.gz
  cache_enabled: true
  cache_dir: /cache
  cache_max_size: 10737418240

builtin_mirrors:
  dockerhub: []
  ghcr: []
