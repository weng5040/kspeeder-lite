services:
  pullfusion:
    # 开发：使用 build 从源码构建
    # 生产：注释 build，取消注释 image 使用预构建镜像
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # image: ghcr.io/weng5040/pullfusion:latest
    container_name: pullfusion
    ports:
      - "443:443"
      - "5003:5003"
    volumes:
      - ./config:/config
      - ./cache:/cache
    environment:
      - TZ=Asia/Shanghai
      - PF_CONFIG=/config/nodes.yaml
    restart: unless-stopped
